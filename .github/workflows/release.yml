name: Release

on:
  workflow_call:
    inputs:
      toc_file:
        description: 'The TOC file to update (e.g., PeaversTalentsData.toc)'
        required: true
        type: string
      addon_name:
        description: 'The addon name for tagging (e.g., PeaversTalentsData)'
        required: true
        type: string
      git_user_name:
        description: 'Git user name for commits'
        required: false
        type: string
        default: 'github-actions[bot]'
      git_user_email:
        description: 'Git user email for commits'
        required: false
        type: string
        default: 'github-actions[bot]@users.noreply.github.com'
      use_self_hosted:
        description: 'Use self-hosted runner instead of GitHub-hosted'
        required: false
        type: boolean
        default: false
      publish_curseforge:
        description: 'Upload the packaged addon to CurseForge'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  actions: write
  id-token: write          # mint the GitHub App token via Vault OIDC (self-hosted)

concurrency:
  group: release-${{ inputs.addon_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ inputs.use_self_hosted && 'warcraft-runners' || 'ubuntu-latest' }}
    steps:
      # Mint a short-lived GitHub App token via Vault OIDC and push as the App.
      # All callers run self-hosted; the PERSONAL_ACCESS_TOKEN PAT is retired.
      - name: Mint GitHub App token (Vault OIDC)
        id: ghtoken
        uses: peavers/.github/actions/gh-app-token@main

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.ghtoken.outputs.token }}

      - name: Get current version and increment
        id: version
        run: |
          CURRENT_VERSION=$(grep -oP '(?<=## Version: ).*' ${{ inputs.toc_file }})
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update TOC version
        run: |
          sed -i "s/^## Version: .*$/## Version: ${{ steps.version.outputs.new_version }}/" ${{ inputs.toc_file }}

      - name: Commit version bump
        run: |
          git config user.name "${{ inputs.git_user_name }}"
          git config user.email "${{ inputs.git_user_email }}"
          git add ${{ inputs.toc_file }}
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git pull --rebase origin master
          git push

      - name: Create and push tag
        id: tag
        run: |
          NEW_TAG="${{ inputs.addon_name }}-${{ steps.version.outputs.new_version }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        uses: peavers-warcraft/workflow-templates/.github/actions/generate-changelog@master
        with:
          addon_name: ${{ inputs.addon_name }}
          version: ${{ steps.version.outputs.new_version }}

      - name: Generate Changelog.lua
        env:
          ADDON_NAME: ${{ inputs.addon_name }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          CHANGELOG_JSON: ${{ steps.changelog.outputs.changelog_json }}
          TOC_FILE: ${{ inputs.toc_file }}
        run: |
          # Build Lua entries from JSON
          LUA_ENTRIES=""
          if [ -n "$CHANGELOG_JSON" ] && [ "$CHANGELOG_JSON" != "[]" ]; then
            LUA_ENTRIES=$(echo "$CHANGELOG_JSON" | jq -r '.[] | "        { type = \"" + .type + "\", text = \"" + (.text | gsub("\""; "\\\"")) + "\" },"')
          fi

          {
            echo "-- Auto-generated during release. Do not edit."
            echo "PeaversChangelogs = PeaversChangelogs or {}"
            echo "PeaversChangelogs[\"${ADDON_NAME}\"] = {"
            echo "    version = \"${NEW_VERSION}\","
            echo "    entries = {"
            if [ -n "$LUA_ENTRIES" ]; then
              echo "$LUA_ENTRIES"
            fi
            echo "    }"
            echo "}"
          } > Changelog.lua

          # Ensure Changelog.lua is in the TOC file
          if ! grep -q "^Changelog.lua" "$TOC_FILE"; then
            echo "Changelog.lua" >> "$TOC_FILE"
          fi

      - name: Package addon
        id: package
        run: |
          RELEASE_DIR="${{ inputs.addon_name }}"
          ZIP_NAME="${{ inputs.addon_name }}-${{ steps.version.outputs.new_version }}.zip"

          # Create clean copy excluding non-addon files
          mkdir -p "$RELEASE_DIR"
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' ! -name '.pkgmeta' ! -name '.gitignore' ! -name '*.md' ! -name 'scripts' ! -name 'local_deploy.sh' ! -name 'local_deploy.ps1' ! -name "$RELEASE_DIR" -exec cp -r {} "$RELEASE_DIR/" \;

          # Create zip and cleanup
          zip -r "$ZIP_NAME" "$RELEASE_DIR"
          rm -rf "$RELEASE_DIR"
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256"
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ steps.ghtoken.outputs.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            "${{ steps.package.outputs.zip_name }}" \
            "${{ steps.package.outputs.zip_name }}.sha256" \
            --title "${{ inputs.addon_name }} v${{ steps.version.outputs.new_version }}" \
            --notes "${{ steps.changelog.outputs.changelog }}" \
            --latest

      # Poke the addons.peavers.io data pipeline so the static updater catalog
      # (public/data/updater-catalog.json) rebuilds within minutes of this
      # release instead of waiting for its 12h schedule. Best-effort: the
      # scheduled rebuild is the fallback if the poke fails.
      #
      # The dispatch target lives in peavers-code, but the release token above
      # is scoped to the calling repo's org (peavers-warcraft) — using it here
      # 404s. Mint a second token against the App's peavers-code installation.
      - name: Mint peavers-code token for catalog poke (Vault OIDC)
        id: ghtoken-code
        continue-on-error: true
        uses: peavers/.github/actions/gh-app-token@main
        with:
          owner: peavers-code

      - name: Trigger catalog rebuild
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.ghtoken-code.outputs.token }}
        run: |
          gh api repos/peavers-code/addons.peavers.io/dispatches \
            -f event_type=addon-released \
            -F 'client_payload[addon]=${{ inputs.addon_name }}' \
            -F 'client_payload[version]=${{ steps.version.outputs.new_version }}'

      # Upload to CurseForge immediately. Runs last so a CurseForge failure
      # never blocks the GitHub release or the catalog poke above.
      # CI secrets live in Vault (single source of truth, no GitHub secret-visibility
      # footguns). Requires the in-cluster runner + id-token: write (both already present).
      #
      # Skipped for addons distributed exclusively through addons.peavers.io
      # (publish_curseforge: false). Everything above still runs — the GitHub
      # Release and the catalog poke are what the Updater actually consumes, so
      # those addons release exactly as before, just without the CurseForge leg.
      - name: Fetch CI secrets from Vault
        if: inputs.publish_curseforge
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.vault.svc.cluster.local:8200
          method: jwt
          path: jwt-github
          role: ci
          jwtGithubAudience: https://vault.internal
          tlsSkipVerify: true
          exportToken: false
          secrets: |
            kv/data/cluster/_shared/curseforge api_key | CF_API_KEY

      - name: Upload to CurseForge
        if: inputs.publish_curseforge
        uses: peavers-code/peavers-warcraft-workflows/.github/actions/upload-curseforge@master
        with:
          api_key: ${{ env.CF_API_KEY }}
          toc_file: ${{ inputs.toc_file }}
          zip_file: ${{ steps.package.outputs.zip_name }}
          changelog: ${{ steps.changelog.outputs.changelog }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: release
    if: failure()
    steps:
      - name: Notify Discord
        uses: peavers-warcraft/workflow-templates/.github/actions/notify-discord@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "Release Failed"
