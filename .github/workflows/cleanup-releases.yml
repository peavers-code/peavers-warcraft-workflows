name: Cleanup Old Releases

on:
  workflow_call:
    inputs:
      use_self_hosted:
        description: 'Use self-hosted runner instead of GitHub-hosted (default: true)'
        required: false
        type: boolean
        default: true
      bank_downloads:
        description: 'Bank each deleted release download count into .peavers-downloads.json'
        required: false
        type: boolean
        default: false
      git_user_name:
        description: 'Git user name for the banking commit'
        required: false
        type: string
        default: 'github-actions[bot]'
      git_user_email:
        description: 'Git user email for the banking commit'
        required: false
        type: string
        default: 'github-actions[bot]@users.noreply.github.com'

permissions:
  contents: write
  id-token: write          # mint the GitHub App token via Vault OIDC (self-hosted)

jobs:
  cleanup-releases:
    runs-on: ${{ inputs.use_self_hosted && 'warcraft-runners' || 'ubuntu-latest' }}
    steps:
      # All callers run self-hosted; the PERSONAL_ACCESS_TOKEN PAT is retired.
      - name: Mint GitHub App token
        id: ghtoken
        uses: peavers/.github/actions/gh-app-token@main

      # Token on the checkout so the banking step below can push its commit.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.ghtoken.outputs.token }}

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          else
            echo "GitHub CLI already installed"
          fi

      - name: Delete old releases
        id: cleanup
        env:
          GITHUB_TOKEN: ${{ steps.ghtoken.outputs.token }}
        run: |
          set +e  # Don't exit on error, we'll handle errors manually

          echo "Fetching all releases..."

          # Get all releases (id + tag + asset download count) sorted by creation
          # date (newest first). The download count is banked below before the
          # release is deleted — once it's gone, GitHub has no record of it and
          # the addon's total would ratchet backwards.
          RELEASES=$(gh api repos/${{ github.repository }}/releases --paginate --jq 'sort_by(.created_at) | reverse | .[] | "\(.id)|\(.tag_name)|\([.assets[].download_count] | add // 0)"')

          # Convert to array (each element is "id|tag_name|downloads"; tag names have no spaces)
          RELEASE_ARRAY=($RELEASES)

          # Count total releases
          TOTAL_RELEASES=${#RELEASE_ARRAY[@]}
          echo "Found $TOTAL_RELEASES release(s)"

          if [ $TOTAL_RELEASES -le 1 ]; then
            echo "Only one or no releases found. Nothing to delete."
            echo "banked=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Keep the first one (most recent), delete the rest
          IFS='|' read -r KEEP_ID KEEP_TAG KEEP_DOWNLOADS <<< "${RELEASE_ARRAY[0]}"
          echo "Keeping the most recent release (ID: $KEEP_ID, tag: $KEEP_TAG, downloads: $KEEP_DOWNLOADS)"
          echo "Will delete $((TOTAL_RELEASES - 1)) releases (and their tags)..."

          DELETED=0
          TAGS_DELETED=0
          FAILED=0
          BANKED=0

          for ((i=1; i<$TOTAL_RELEASES; i++)); do
            IFS='|' read -r RELEASE_ID TAG_NAME RELEASE_DOWNLOADS <<< "${RELEASE_ARRAY[$i]}"

            # Show progress every 100 deletions
            if [ $((i % 100)) -eq 0 ]; then
              echo "Progress: Deleted $DELETED of $((TOTAL_RELEASES - 1)) releases..."
            fi

            # Attempt to delete with full error output for first few
            ERROR_OUTPUT=$(gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID 2>&1)
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              ((DELETED++))
              # Bank the downloads this release accrued before it vanishes.
              BANKED=$((BANKED + RELEASE_DOWNLOADS))
              # Deleting a release leaves its tag behind, so delete the tag too — otherwise
              # tags accumulate indefinitely (thousands of tag-only refs over time).
              if [ -n "$TAG_NAME" ] && [ "$TAG_NAME" != "null" ]; then
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG_NAME" >/dev/null 2>&1 && ((TAGS_DELETED++))
              fi
            else
              # Show detailed error for first 5 failures
              if [ $FAILED -lt 5 ]; then
                echo "Failed to delete release ID: $RELEASE_ID"
                echo "Error: $ERROR_OUTPUT"
              fi
              ((FAILED++))
            fi

            # Small delay to avoid rate limiting (every 10 deletions)
            if [ $((i % 10)) -eq 0 ]; then
              sleep 0.1
            fi
          done

          echo "============================================="
          echo "Cleanup completed!"
          echo "Kept: 1 release (+ its tag)"
          echo "Deleted: $DELETED releases, $TAGS_DELETED tags"
          echo "Failed: $FAILED releases"
          echo "Downloads banked from deleted releases: $BANKED"
          echo "============================================="

          echo "banked=$BANKED" >> $GITHUB_OUTPUT

          # Exit with error if too many failures
          if [ $FAILED -gt 100 ]; then
            echo "Too many failures, exiting with error"
            exit 1
          fi

      # Only addons whose download total is sourced from GitHub rather than
      # CurseForge need this ledger (see the `exclusive` flag in .peavers.yml).
      # The site adds this figure to the counts of the releases still standing,
      # so the total keeps climbing across nightly cleanups instead of resetting.
      - name: Bank download counts
        if: inputs.bank_downloads && steps.cleanup.outputs.banked != '0'
        env:
          GITHUB_TOKEN: ${{ steps.ghtoken.outputs.token }}
          BANKED: ${{ steps.cleanup.outputs.banked }}
        run: |
          set -e
          LEDGER=".peavers-downloads.json"

          PREVIOUS=0
          if [ -f "$LEDGER" ]; then
            PREVIOUS=$(jq -r '.archived // 0' "$LEDGER")
          fi
          TOTAL=$((PREVIOUS + BANKED))

          jq -n --argjson archived "$TOTAL" \
            '{archived: $archived, note: "Downloads accrued by deleted GitHub releases. Maintained by cleanup-releases.yml; do not edit by hand."}' \
            > "$LEDGER"

          git config user.name "${{ inputs.git_user_name }}"
          git config user.email "${{ inputs.git_user_email }}"
          git add "$LEDGER"
          git commit -m "chore: bank $BANKED downloads from deleted releases (total $TOTAL) [skip ci]"

          # The scheduled data-update jobs push constantly; rebase rather than fail.
          for attempt in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && git push && exit 0
            echo "Push attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "::error::Could not push the download ledger after 3 attempts"
          exit 1

  notify-failure:
    runs-on: ubuntu-latest
    needs: cleanup-releases
    if: failure()
    steps:
      - name: Notify Discord
        uses: peavers-warcraft/workflow-templates/.github/actions/notify-discord@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "Cleanup Releases Failed"