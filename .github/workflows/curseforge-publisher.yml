name: CurseForge Publisher

# Central delayed publisher: addon releases go live on GitHub instantly (consumed
# by the Peavers Updater app) and are uploaded to CurseForge once they are at
# least `delay_days` (default 7) days old.
#
# Idempotency is tracked with marker assets on each release (1 byte, not
# empty: the upload API 400s on zero-byte assets; not dot-prefixed: the API
# renames ".foo" assets to "default.foo", so matching is by endswith):
#   curseforge-uploaded  - this release was uploaded to CurseForge
#   curseforge-skipped   - superseded by a newer release (or no CF project ID)
# A release is eligible when it is old enough and carries neither marker.
# Only the NEWEST eligible release per repo is uploaded (CurseForge only ever
# wants the latest); older eligible releases are marked skipped.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      delay_days:
        description: 'Minimum age (days) before a release is uploaded to CurseForge'
        required: false
        type: string
        default: '7'

permissions:
  contents: write
  id-token: write          # Vault OIDC (GitHub App token + CF API key)

concurrency:
  group: curseforge-publisher
  cancel-in-progress: false

jobs:
  discover:
    runs-on: peavers-code-runners
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      has_work: ${{ steps.find.outputs.has_work }}
    steps:
      - name: Mint GitHub App token (Vault OIDC)
        id: ghtoken
        uses: peavers/.github/actions/gh-app-token@main
        with:
          owner: peavers-warcraft   # releases live there, not in this repo's org

      - name: Find eligible releases
        id: find
        env:
          GITHUB_TOKEN: ${{ steps.ghtoken.outputs.token }}
          DELAY_DAYS: ${{ inputs.delay_days || '7' }}
        run: |
          set -euo pipefail
          ORG="peavers-warcraft"
          # Non-addon repos that also publish GitHub releases
          EXCLUDE="workflow-templates peavers-updater PeaversAddonDataSupplier"
          CUTOFF=$(date -u -d "-${DELAY_DAYS} days" +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff: releases published before $CUTOFF"

          MATRIX='[]'
          for REPO in $(gh api "orgs/$ORG/repos" --paginate -q '.[].name'); do
            if echo " $EXCLUDE " | grep -q " $REPO "; then
              continue
            fi

            # Recent releases: tag, published_at, asset names. Addon release tags
            # look like <Repo>-<major>.<minor>.<patch>.
            RELEASES=$(gh api "repos/$ORG/$REPO/releases?per_page=100" -q '
              [ .[]
                | select(.draft == false and .prerelease == false)
                | { tag: .tag_name,
                    published_at: .published_at,
                    assets: [.assets[].name] } ]' 2>/dev/null || echo '[]')

            # Eligible: old enough, no marker asset, tag matches the addon pattern,
            # and a zip asset exists. Sorted newest first.
            ELIGIBLE=$(echo "$RELEASES" | jq -c --arg cutoff "$CUTOFF" --arg repo "$REPO" '
              [ .[]
                | select(.published_at <= $cutoff)
                | select(([.assets[] | select(endswith("curseforge-uploaded"))] | length) == 0)
                | select(([.assets[] | select(endswith("curseforge-skipped"))] | length) == 0)
                | select(.tag | test("^" + $repo + "-[0-9]+\\.[0-9]+\\.[0-9]+$"))
                | select([.assets[] | select(endswith(".zip"))] | length > 0) ]
              | sort_by(.published_at) | reverse')

            COUNT=$(echo "$ELIGIBLE" | jq 'length')
            [ "$COUNT" -eq 0 ] && continue
            echo "$REPO: $COUNT eligible release(s)"

            # Newest eligible -> upload; the rest -> mark skipped (superseded).
            NEWEST_TAG=$(echo "$ELIGIBLE" | jq -r '.[0].tag')
            ZIP_NAME=$(echo "$ELIGIBLE" | jq -r '.[0].assets[] | select(endswith(".zip"))' | head -1)
            MATRIX=$(echo "$MATRIX" | jq -c --arg repo "$ORG/$REPO" --arg tag "$NEWEST_TAG" --arg zip "$ZIP_NAME" \
              '. += [{repo: $repo, tag: $tag, zip: $zip}]')

            echo skipped > curseforge-skipped
            for TAG in $(echo "$ELIGIBLE" | jq -r '.[1:][].tag'); do
              echo "  superseded: $TAG"
              gh release upload "$TAG" curseforge-skipped --repo "$ORG/$REPO" --clobber
            done
          done

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_work=$(echo "$MATRIX" | jq 'length > 0')" >> "$GITHUB_OUTPUT"
          echo "Publishing: $(echo "$MATRIX" | jq -r '.[] | "\(.repo)@\(.tag)"')"

  publish:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: peavers-code-runners
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Mint GitHub App token (Vault OIDC)
        id: ghtoken
        uses: peavers/.github/actions/gh-app-token@main
        with:
          owner: peavers-warcraft   # releases live there, not in this repo's org

      - name: Fetch CI secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.vault.svc.cluster.local:8200
          method: jwt
          path: jwt-github
          role: ci
          jwtGithubAudience: https://vault.internal
          tlsSkipVerify: true
          exportToken: false
          secrets: |
            kv/data/cluster/_shared/curseforge api_key | CF_API_KEY

      # The upload-curseforge composite action lives in this repo.
      - name: Checkout workflow-templates
        uses: actions/checkout@v4

      - name: Download and extract release zip
        id: fetch
        env:
          GITHUB_TOKEN: ${{ steps.ghtoken.outputs.token }}
        run: |
          set -euo pipefail
          mkdir -p work && cd work
          gh release download "${{ matrix.release.tag }}" \
            --repo "${{ matrix.release.repo }}" \
            --pattern "${{ matrix.release.zip }}"
          unzip -q "${{ matrix.release.zip }}"

          # The zip contains a single top-level addon folder; find its .toc
          # (folder name may differ from the .toc name, e.g. DueReady/DuoReady.toc).
          ADDON_DIR=$(find . -mindepth 1 -maxdepth 1 -type d | head -1)
          TOC_FILE=$(find "$ADDON_DIR" -maxdepth 1 -name '*.toc' | head -1)
          if [ -z "$TOC_FILE" ]; then
            echo "::error::No .toc found in ${{ matrix.release.zip }}"
            exit 1
          fi
          echo "toc_file=work/${TOC_FILE#./}" >> "$GITHUB_OUTPUT"
          echo "zip_file=work/${{ matrix.release.zip }}" >> "$GITHUB_OUTPUT"

          # .pkgmeta is excluded from the zip but the upload action reads it
          # (next to the .toc) for CurseForge dependency relations.
          gh api "repos/${{ matrix.release.repo }}/contents/.pkgmeta?ref=${{ matrix.release.tag }}" \
            -q .content 2>/dev/null | base64 -d > "$ADDON_DIR/.pkgmeta" || rm -f "$ADDON_DIR/.pkgmeta"

          # No CurseForge project -> mark skipped so it is never retried.
          if ! grep -q 'X-Curse-Project-ID:' "$TOC_FILE"; then
            echo "No X-Curse-Project-ID in $TOC_FILE - marking release skipped"
            echo skipped > curseforge-skipped
            gh release upload "${{ matrix.release.tag }}" curseforge-skipped \
              --repo "${{ matrix.release.repo }}" --clobber
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read release changelog
        id: changelog
        if: steps.fetch.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ steps.ghtoken.outputs.token }}
        run: |
          gh release view "${{ matrix.release.tag }}" \
            --repo "${{ matrix.release.repo }}" --json body -q .body > changelog.md
          {
            echo "changelog<<PEAVERS_EOF"
            cat changelog.md
            echo "PEAVERS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge
        if: steps.fetch.outputs.skip == 'false'
        uses: ./.github/actions/upload-curseforge
        with:
          api_key: ${{ env.CF_API_KEY }}
          toc_file: ${{ steps.fetch.outputs.toc_file }}
          zip_file: ${{ steps.fetch.outputs.zip_file }}
          changelog: ${{ steps.changelog.outputs.changelog }}

      - name: Mark release uploaded
        if: steps.fetch.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ steps.ghtoken.outputs.token }}
        run: |
          echo uploaded > curseforge-uploaded
          gh release upload "${{ matrix.release.tag }}" curseforge-uploaded \
            --repo "${{ matrix.release.repo }}" --clobber

  notify-failure:
    runs-on: ubuntu-latest
    needs: [discover, publish]
    if: failure()
    steps:
      - name: Notify Discord
        uses: peavers-warcraft/workflow-templates/.github/actions/notify-discord@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "CurseForge Publisher Failed"
